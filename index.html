<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Check-in Sampling</title>

<style>
  * {
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background: #fcf6f0;
    display: flex;
    justify-content: center;
    padding: 20px;
    margin: 0;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    padding: 24px;
    border-radius: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    background: #fff3e0;
    padding: 12px;
    border-radius: 16px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: #ff7043;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
  }

  .header-text h3 {
    margin: 0;
    font-size: 18px;
    color: #e65100;
  }

  .header-text p {
    margin: 4px 0 0 0;
    font-size: 12px;
    color: #555;
  }

  .steps-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    position: relative;
    padding: 0 10px;
  }

  .steps-bar::before {
    content: "";
    position: absolute;
    top: 16px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: #e0e0e0;
    z-index: 1;
  }

  .step-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
    background: #fff;
    padding: 0 4px;
  }

  .step-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #e0e0e0;
    color: #777;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .step-item.active .step-num {
    background: #ff7043;
    color: white;
  }

  .step-label {
    font-size: 11px;
    color: #666;
    text-align: center;
    max-width: 80px;
    line-height: 1.2;
  }
  
  .step-item.active .step-label {
    font-weight: 600;
    color: #e65100;
  }

  .alert-box {
    background: #fff3e0;
    border-left: 4px solid #ff7043;
    padding: 12px 16px;
    border-radius: 0 12px 12px 0;
    font-size: 13px;
    color: #333;
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .camera-container {
    position: relative;
    width: 100%;
    min-height: 240px;
    background: #f0f0f0;
    border-radius: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  video, img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
    display: none;
  }
  
  .placeholder-text {
    color: #888;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }

  .camera-select-group {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .camera-select-group label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
  }

  select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    background: #fff;
    font-size: 14px;
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 16px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.2s;
  }

  button:active { opacity: 0.85; }

  .btn-open { background: #ff7043; color: white; }
  .btn-capture { background: #2196f3; color: white; }
  .btn-retake { background: #78909c; color: white; }
  .btn-upload { background: #2e7d32; color: white; }
  .btn-form { background: #d32f2f; color: white; }

  #status {
    text-align: center;
    font-size: 13px;
    color: #555;
    margin: 14px 0;
    font-weight: 500;
  }

  #link {
    text-align: center;
    margin-bottom: 12px;
  }

  #link a {
    color: #1565c0;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
  }
  
  #link a:hover { text-decoration: underline; }
</style>
</head>

<body>

<div class="card">
  <div class="header-logo">
    <div class="logo-icon">📸</div>
    <div class="header-text">
      <h3>Check-in Sampling 2026</h3>
      <p>Chụp ảnh báo cáo khi bắt đầu ca làm việc</p>
    </div>
  </div>

  <div class="steps-bar">
    <div class="step-item active" id="step1">
      <div class="step-num">1</div>
      <div class="step-label">Mở & Chụp ảnh</div>
    </div>
    <div class="step-item" id="step2">
      <div class="step-num">2</div>
      <div class="step-label">Upload Drive</div>
    </div>
    <div class="step-item" id="step3">
      <div class="step-num">3</div>
      <div class="step-label">Điền Form</div>
    </div>
  </div>

  <div class="alert-box">
    <strong>Bước 1:</strong> Mở Camera → Chọn kiểu cam (Trước/Sau) → Chụp.
    <br><strong>Bước 2:</strong> Upload lên Drive. 
    <br><strong>Bước 3:</strong> Điền Form báo cáo.
  </div>

  <div class="camera-container">
    <div id="placeholder" class="placeholder-text">Chưa mở camera</div>
    <video id="video" autoplay playsinline></video>
    <img id="preview" alt="Ảnh chụp"/>
  </div>

  <div class="camera-select-group" id="camSelectGroup">
    <label>Chọn kiểu Camera:</label>
    <select id="cameraSelect" onchange="switchCamera()">
      </select>
  </div>

  <button class="btn-open" id="openBtn" onclick="initCamera()">📸 Bắt đầu ca</button>
  <button class="btn-capture" id="captureBtn" style="display:none" onclick="capture()">📷 Chụp Ảnh</button>
  <button class="btn-retake" id="retakeBtn" style="display:none" onclick="retakeCam()">🔄 Chụp lại</button>
  <button class="btn-upload" id="uploadBtn" style="display:none" onclick="upload()">⬆️ Upload lên Drive</button>

  <div id="status"></div>
  <div id="link"></div>

  <button class="btn-form" id="formBtn" style="display:none" onclick="goForm()">
    📝 Điền Google Form
  </button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzu_w6vDyxbSCVE5ryj7lCeatoj8ZQHycSVVSHLiesgdgXjmVzBBwjzxUw5jaFD-d-0/exec";
const FORM_URL = "https://forms.gle/Gyu1uUKSNNDMmSzi7";
const ENTRY_ID = "entry.1519431587";

let stream;
let imgData;
let uploadedLink;
let currentFacingMode = "environment"; 
let videoDevices = [];
let currentDeviceId = null;

function setStatus(t){ 
  document.getElementById("status").innerText = t; 
}

function updateStep(stepIndex) {
  const steps = ["step1", "step2", "step3"];
  steps.forEach((s, index) => {
    document.getElementById(s).classList.toggle("active", index < stepIndex);
  });
}

// BƯỚC 1: Lấy quyền và danh sách camera trước
async function initCamera() {
  try {
    setStatus("Đang khởi tạo danh sách camera...");
    await navigator.mediaDevices.getUserMedia({ video: true }); // Lấy quyền
    const devices = await navigator.mediaDevices.enumerateDevices();
