<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Check-in Sampling</title>

<style>
  * {
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background: #fcf6f0; /* Màu nền cam nhạt nhẹ nhàng */
    display: flex;
    justify-content: center;
    padding: 20px;
    margin: 0;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    padding: 24px;
    border-radius: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    background: #fff3e0;
    padding: 12px;
    border-radius: 16px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: #ff7043;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
  }

  .header-text h3 {
    margin: 0;
    font-size: 18px;
    color: #e65100;
  }

  .header-text p {
    margin: 4px 0 0 0;
    font-size: 12px;
    color: #555;
  }

  /* Thanh tiến trình bước */
  .steps-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    position: relative;
    padding: 0 10px;
  }

  .steps-bar::before {
    content: "";
    position: absolute;
    top: 16px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: #e0e0e0;
    z-index: 1;
  }

  .step-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
    background: #fff;
    padding: 0 4px;
  }

  .step-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #e0e0e0;
    color: #777;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .step-item.active .step-num {
    background: #ff7043;
    color: white;
  }

  .step-label {
    font-size: 11px;
    color: #666;
    text-align: center;
    max-width: 80px;
    line-height: 1.2;
  }
  
  .step-item.active .step-label {
    font-weight: 600;
    color: #e65100;
  }

  /* Hướng dẫn */
  .alert-box {
    background: #fff3e0;
    border-left: 4px solid #ff7043;
    padding: 12px 16px;
    border-radius: 0 12px 12px 0;
    font-size: 13px;
    color: #333;
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .alert-box strong {
    color: #e65100;
  }

  /* Camera và video */
  .camera-container {
    position: relative;
    width: 100%;
    min-height: 240px;
    background: #f0f0f0;
    border-radius: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  video, img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
    display: none;
  }
  
  .placeholder-text {
    color: #888;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }

  /* Nút chọn camera (ẩn/hiện) */
  .camera-select-group {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .camera-select-group label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
  }

  select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    background: #fff;
    font-size: 14px;
  }

  /* Nút bấm */
  button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 16px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.2s;
  }

  button:active {
    opacity: 0.85;
  }

  .btn-open { background: #ff7043; color: white; }
  .btn-capture { background: #2196f3; color: white; }
  .btn-retake { background: #78909c; color: white; }
  .btn-upload { background: #2e7d32; color: white; }
  .btn-form { background: #d32f2f; color: white; }

  #status {
    text-align: center;
    font-size: 13px;
    color: #555;
    margin: 14px 0;
    font-weight: 500;
  }

  #link {
    text-align: center;
    margin-bottom: 12px;
  }

  #link a {
    color: #1565c0;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
  }
  
  #link a:hover { text-decoration: underline; }
</style>
</head>

<body>

<div class="card">
  <div class="header-logo">
    <div class="logo-icon">📸</div>
    <div class="header-text">
      <h3>Check-in Sampling 2026</h3>
      <p>Chụp ảnh báo cáo khi bắt đầu ca làm việc</p>
    </div>
  </div>

  <div class="steps-bar">
    <div class="step-item active" id="step1">
      <div class="step-num">1</div>
      <div class="step-label">Mở & Chụp ảnh</div>
    </div>
    <div class="step-item" id="step2">
      <div class="step-num">2</div>
      <div class="step-label">Upload Drive</div>
    </div>
    <div class="step-item" id="step3">
      <div class="step-num">3</div>
      <div class="step-label">Điền Form</div>
    </div>
  </div>

  <div class="alert-box">
    Dùng trang này để lưu trữ ảnh Check-in nhanh chóng. 
    <br>Thực hiện: <strong>Mở Camera → Chọn Camera (Trước/Sau) → Chụp Ảnh → Upload lên Drive → Điền Form.</strong>
  </div>

  <div class="camera-container">
    <div id="placeholder" class="placeholder-text">Chưa mở camera</div>
    <video id="video" autoplay playsinline></video>
    <img id="preview" alt="Ảnh chụp"/>
  </div>

  <div class="camera-select-group" id="camSelectGroup">
    <label>Chọn loại Camera:</label>
    <select id="cameraSelect" onchange="switchCamera()">
      </select>
  </div>

  <button class="btn-open" id="openBtn" onclick="openCamera()">📸 Mở Camera</button>
  <button class="btn-capture" id="captureBtn" style="display:none" onclick="capture()">📷 Chụp Ảnh</button>
  <button class="btn-retake" id="retakeBtn" style="display:none" onclick="retakeCam()">🔄 Chụp lại</button>
  <button class="btn-upload" id="uploadBtn" style="display:none" onclick="upload()">⬆️ Upload lên Drive</button>

  <div id="status"></div>
  <div id="link"></div>

  <button class="btn-form" id="formBtn" style="display:none" onclick="goForm()">
    📝 Điền Google Form
  </button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzu_w6vDyxbSCVE5ryj7lCeatoj8ZQHycSVVSHLiesgdgXjmVzBBwjzxUw5jaFD-d-0/exec";
const FORM_URL = "https://forms.gle/Gyu1uUKSNNDMmSzi7";
const ENTRY_ID = "entry.1519431587";

let stream;
let imgData;
let uploadedLink;
let currentFacingMode = "environment"; // Mặc định camera sau (environment)
let videoDevices = [];

function setStatus(t){ 
  document.getElementById("status").innerText = t; 
}

function updateStep(stepIndex) {
  document.getElementById("step1").classList.remove("active");
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step3").classList.remove("active");

  if(stepIndex >= 1) document.getElementById("step1").classList.add("active");
  if(stepIndex >= 2) document.getElementById("step2").classList.add("active");
  if(stepIndex >= 3) document.getElementById("step3").classList.add("active");
}

// Lọc các thiết bị camera để người dùng chọn
async function getCameraDevices() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    videoDevices = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById("cameraSelect");
    select.innerHTML = "";
    
    videoDevices.forEach((device, index) => {
      const option = document.createElement("option");
      option.value = device.deviceId;
      // Gắn nhãn hoặc đoán xem trước/sau
      let label = device.label || `Camera ${index + 1}`;
      if(label.toLowerCase().includes('back') || label.toLowerCase().includes('sau')) {
        label = "Camera Sau (Môi trường)";
      } else if(label.toLowerCase().includes('front') || label.toLowerCase().includes('trước')) {
        label = "Camera Trước (Selfie)";
      }
      option.text = label;
      select.appendChild(option);
    });
    
    if(videoDevices.length > 0) {
      document.getElementById("camSelectGroup").style.display = "flex";
    }
  } catch(e) {
    console.error("Lỗi lấy danh sách camera:", e);
  }
}

async function openCamera(){
  try {
    setStatus("Đang bật camera...");
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }

    const selectedDeviceId = document.getElementById("cameraSelect").value;
    const constraints = selectedDeviceId ? 
      { video: { deviceId: { exact: selectedDeviceId } } } : 
      { video: { facingMode: currentFacingMode } };

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    
    const video = document.getElementById("video");
    video.srcObject = stream;
    
    document.getElementById("placeholder").style.display = "none";
    video.style.display = "block";
    document.getElementById("preview").style.display = "none";

    document.getElementById("openBtn").style.display = "none";
    document.getElementById("captureBtn").style.display = "flex";
    document.getElementById("retakeBtn").style.display = "none";
    document.getElementById("uploadBtn").style.display = "none";
    
    await getCameraDevices();
    setStatus("Camera đã sẵn sàng. Hãy bấm Chụp ảnh!");
    updateStep(1);
  } catch(err) {
    console.error(err);
    setStatus("Không thể mở camera. Vui lòng cấp quyền truy cập!");
    alert("Vui lòng cho phép trang web truy cập Camera trên thiết bị của bạn.");
  }
}

async function switchCamera() {
  // Khi đổi lựa chọn camera trong thẻ select
  openCamera();
}

function capture(){
  const video = document.getElementById("video");
  const preview = document.getElementById("preview");
  const canvas = document.createElement("canvas");

  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;

  canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);

  imgData = canvas.toDataURL("image/jpeg", 0.8);

  preview.src = imgData;
  preview.style.display = "block";
  video.style.display = "none";

  if(stream) {
    stream.getTracks().forEach(t => t.stop());
  }

  document.getElementById("captureBtn").style.display = "none";
  document.getElementById("retakeBtn").style.display = "flex";
  document.getElementById("uploadBtn").style.display = "flex";
  document.getElementById("camSelectGroup").style.display = "none";

  setStatus("Đã chụp ảnh xong. Bấm nút Upload lên Drive nhé!");
  updateStep(1);
}

function retakeCam() {
  imgData = null;
  document.getElementById("preview").style.display = "none";
  document.getElementById("link").innerHTML = "";
  document.getElementById("formBtn").style.display = "none";
  document.getElementById("uploadBtn").style.display = "none";
  document.getElementById("retakeBtn").style.display = "none";
  
  openCamera(); // Mở lại camera ngay lập tức
}

async function upload(){
  if(!imgData) return alert("Chưa có ảnh, vui lòng chụp lại!");

  setStatus("Đang tải ảnh lên Google Drive, vui lòng đợi một chút...");
  document.getElementById("uploadBtn").disabled = true;
  document.getElementById("uploadBtn").style.opacity = "0.5";

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        image: imgData,
        filename: "checkin.jpg"
      })
    });

    const data = await res.json();

    if(data.success){
      uploadedLink = data.url;

      document.getElementById("link").innerHTML =
        `✅ <a href="${uploadedLink}" target="_blank">Xem ảnh vừa lưu trên Drive</a>`;

      document.getElementById("formBtn").style.display = "flex";
      setStatus("Upload lên Drive thành công!");
      updateStep(2);
    } else {
      setStatus("Upload lỗi, thử lại xem sao nhé!");
      document.getElementById("uploadBtn").disabled = false;
      document.getElementById("uploadBtn").style.opacity = "1";
    }
  } catch (e) {
    console.error(e);
    setStatus("Lỗi kết nối server khi tải ảnh.");
    document.getElementById("uploadBtn").disabled = false;
    document.getElementById("uploadBtn").style.opacity = "1";
  }
}

function goForm(){
  if(!uploadedLink) return;

  const url = FORM_URL + "?" + ENTRY_ID + "=" + encodeURIComponent(uploadedLink);
  window.open(url, "_blank");
  updateStep(3);
}
</script>

</body>
</html>
